# version: 1.0.0
"$schema" = 'https://starship.rs/config-schema.json'

# Kripton-v40 colorscheme
# bg: #131519  fg: #e0e0e0  accent: #9bbfbf
add_newline = false
continuation_prompt = "[▸▹ ](dimmed #e0e0e0)"

format = """($nix_shell$container$fill$git_metrics\n)$cmd_duration\
$hostname\
$localip\
$shlvl\
$shell\
$env_var\
$jobs\
$username\
$character"""

right_format = """
$singularity\
$kubernetes\
$directory\
$vcsh\
$fossil_branch\
$git_branch\
$git_commit\
$git_state\
$git_status\
$hg_branch\
$pijul_channel\
$docker_context\
$package\
$c\
$cpp\
$cmake\
$cobol\
$daml\
$dart\
$deno\
$dotnet\
$elixir\
$elm\
$erlang\
$fennel\
$fortran\
$golang\
$guix_shell\
$haskell\
$haxe\
$helm\
$java\
$julia\
$kotlin\
$gradle\
$lua\
$nim\
$nodejs\
$ocaml\
$opa\
$perl\
$php\
$pulumi\
$purescript\
$python\
$raku\
$rlang\
$red\
$ruby\
$rust\
$scala\
$solidity\
$swift\
$terraform\
$vlang\
$vagrant\
$xmake\
$zig\
$buf\
$conda\
$pixi\
$meson\
$spack\
$memory_usage\
$aws\
$gcloud\
$openstack\
$azure\
$crystal\
$custom\
$status\
$os\
$battery\
$time"""

[fill]
symbol = ' '

[character]
format = "$symbol "
success_symbol = "[◎](bold italic #d48e15)"
error_symbol = "[○](italic #b16286)"
vimcmd_symbol = "[■](italic dimmed #8ec07c)"
# not supported in zsh
vimcmd_replace_one_symbol = "◌"
vimcmd_replace_symbol = "□"
vimcmd_visual_symbol = "▼"

[env_var.VIMSHELL]
format = "[$env_value]($style)"
style = '#8ec07c italic'

[sudo]
format = "[$symbol]($style)"
style = "bold italic #a56de2"
symbol = "⋈┈"
disabled = true

[username]
style_user = "#d48e15 bold italic"
style_root = "#b16286 bold italic"
format = "[⭘ $user]($style) "
disabled = false
show_always = false

[directory]
home_symbol = "⌂"
truncation_length = 2
truncation_symbol = "□ "
read_only = " ◈"
use_os_path_sep = true
style = "italic #458588"
format = '[$path]($style)[$read_only]($read_only_style)'
repo_root_style = 'bold #458588'
repo_root_format = '[$before_root_path]($before_repo_root_style)[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) [△](bold #3689e6)'

[cmd_duration]
format = "[◄ $duration ](italic #e0e0e0)"

[jobs]
format = "[$symbol$number]($style) "
style = "#e0e0e0"
symbol = "[▶](#458588 italic)"

[localip]
ssh_only = true
format = " ◯[$localipv4](bold #b16286)"
disabled = false

[time]
disabled = false
format = "[ $time]($style)"
time_format = "%R"
utc_time_offset = "local"
style = "italic dimmed #e0e0e0"

[battery]
format = "[ $percentage $symbol]($style)"
full_symbol = "█"
charging_symbol = "[↑](italic bold #8ec07c)"
discharging_symbol = "↓"
unknown_symbol = "░"
empty_symbol = "▃"

[[battery.display]]
threshold = 20
style = "italic bold #cd3520"

[[battery.display]]
threshold = 60
style = "italic dimmed #a56de2"

[[battery.display]]
threshold = 70
style = "italic dimmed #f9c440"

[git_branch]
format = " [$branch(:$remote_branch)]($style)"
symbol = "[△](bold italic #3689e6)"
style = "italic #3689e6"
truncation_symbol = "⋯"
truncation_length = 11
ignore_branches = ["main", "master"]
only_attached = true

[git_metrics]
format = '([▴$added]($added_style))([▿$deleted]($deleted_style))'
added_style = 'italic dimmed #8ec07c'
deleted_style = 'italic dimmed #cd3520'
ignore_submodules = true
disabled = false

[git_status]
style = "bold italic #3689e6"
format = "([⎪$ahead_behind$staged$modified$untracked$renamed$deleted$conflicted$stashed⎥]($style))"
conflicted = "[◪◦](italic #a56de2)"
ahead = "[▴│[${count}](bold #e0e0e0)│](italic #8ec07c)"
behind = "[▿│[${count}](bold #e0e0e0)│](italic #cd3520)"
diverged = "[◇ ▴┤[${ahead_count}](regular #e0e0e0)│▿┤[${behind_count}](regular #e0e0e0)│](italic #a56de2)"
untracked = "[◌◦](italic #d48e15)"
stashed = "[◃◈](italic #e0e0e0)"
modified = "[●◦](italic #f9c440)"
staged = "[▪┤[$count](bold #e0e0e0)│](italic #9bbfbf)"
renamed = "[◎◦](italic #3689e6)"
deleted = "[✕](italic #cd3520)"

[deno]
format = " [deno](italic) [∫ $version](#8ec07c bold)"
version_format = "${raw}"

[lua]
format = " [lua](italic) [${symbol}${version}]($style)"
version_format = "${raw}"
symbol = "⨀ "
style = "bold #d48e15"

[nodejs]
format = " [node](italic) [◫ ($version)](bold #70af5a)"
version_format = "${raw}"
detect_files = ["package-lock.json", "yarn.lock"]
detect_folders = ["node_modules"]
detect_extensions = []

[python]
format = " [py](italic) [${symbol}${version}]($style)"
symbol = "[⌉](bold #3689e6)⌊ "
version_format = "${raw}"
style = "bold #d48e15"

[ruby]
format = " [rb](italic) [${symbol}${version}]($style)"
symbol = "◆ "
version_format = "${raw}"
style = "bold #cd3520"

[rust]
format = " [rs](italic) [$symbol$version]($style)"
symbol = "⊃ "
version_format = "${raw}"
style = "bold #cd3520"

[package]
format = " [pkg](italic dimmed) [$symbol$version]($style)"
version_format = "${raw}"
symbol = "◨ "
style = "dimmed #f9c440 italic bold"

[swift]
format = " [sw](italic) [${symbol}${version}]($style)"
symbol = "◁ "
style = "bold #b72f1d"
version_format = "${raw}"

[aws]
disabled = true
format = " [aws](italic) [$symbol $profile $region]($style)"
style = "bold #458588"
symbol = "▲ "

[buf]
symbol = "■ "
format = " [buf](italic) [$symbol $version $buf_version]($style)"

[c]
symbol = "ℂ "
format = " [$symbol($version(-$name))]($style)"

[cpp]
symbol = "ℂ "
format = " [$symbol($version(-$name))]($style)"

[conda]
symbol = "◯ "
format = " conda [$symbol$environment]($style)"

[pixi]
symbol = "■ "
format = " pixi [$symbol$version ($environment )]($style)"

[dart]
symbol = "◁◅ "
format = " dart [$symbol($version )]($style)"

[docker_context]
symbol = "◧ "
format = " docker [$symbol$context]($style)"

[elixir]
symbol = "△ "
format = " exs [$symbol $version OTP $otp_version ]($style)"

[elm]
symbol = "◩ "
format = " elm [$symbol($version )]($style)"

[golang]
symbol = "∩ "
format = " go [$symbol($version )]($style)"

[haskell]
symbol = "❯λ "
format = " hs [$symbol($version )]($style)"

[java]
symbol = "∪ "
format = " java [${symbol}(${version} )]($style)"

[julia]
symbol = "◎ "
format = " jl [$symbol($version )]($style)"

[memory_usage]
symbol = "▪▫▪ "
format = " mem [${ram}( ${swap})]($style)"

[nim]
symbol = "▴▲▴ "
format = " nim [$symbol($version )]($style)"

[nix_shell]
style = 'bold italic dimmed #458588'
symbol = '✶'
format = '[$symbol nix⎪$state⎪]($style) [$name](italic dimmed #e0e0e0)'
impure_msg = '[⌽](bold dimmed #cd3520)'
pure_msg = '[⌾](bold dimmed #8ec07c)'
unknown_msg = '[◌](bold dimmed #f9c440)'

[spack]
symbol = "◇ "
format = " spack [$symbol$environment]($style)"
