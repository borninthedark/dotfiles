default_border pixel 2
gaps inner 5
gaps outer 5
smart_gaps on
output HDMI-A-1 mode 1920x1080@74.973Hz

#                       <border>    <background> <text>      <indicator> <child_border>
client.focused          #9bbfbf     #131519      #E0E0E0     #9bbfbf     #9bbfbf
client.unfocused        #9bbfbf     #131519      #7c7d80     #9bbfbf     #9bbfbf
client.focused_inactive #9bbfbf     #131519      #7c7d80     #9bbfbf     #9bbfbf
client.urgent           #cd3520     #cd3520      #E0E0E0     #cd3520     #cd3520

# Exousia theme RPMs: Bibata cursor + Maple Mono NF title/bar font
seat seat0 xcursor_theme Bibata-Modern-Classic 24
font pango:Maple Mono NF 11

set $wob wob

# ---------------------------------------------------------------------------
# Appearance & session environment.
# These are idempotent (set the same values / re-import), so it is safe to
# re-apply them on every reload via exec_always.
# ---------------------------------------------------------------------------
exec_always systemctl --user import-environment
exec_always gsettings set org.gnome.desktop.interface gtk-theme    'Kripton'
exec_always gsettings set org.gnome.desktop.interface icon-theme   'cyberpunk-technotronic'
exec_always gsettings set org.gnome.desktop.interface cursor-theme 'Bibata-Modern-Classic'
exec_always gsettings set org.gnome.desktop.interface cursor-size  24
exec_always gsettings set org.gnome.desktop.interface font-name    'Maple Mono NF 11'
exec_always gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'

# ---------------------------------------------------------------------------
# Long-running helpers — guarded with `pidof -q NAME || NAME` so each stays a
# single instance:
#   * running on reload  -> pidof succeeds, nothing is spawned  (idempotent)
#   * died before reload -> pidof fails, the helper restarts     (self-healing)
# This is the key difference from a bare exec_always, which stacks a new copy
# on every reload.
# ---------------------------------------------------------------------------
# Each helper is wrapped in `sh -c '...'` so the guard logic (||, {}, ;) lives
# inside the quotes — sway's parser treats braces/semicolons as syntax, so they
# must not appear bare on an exec line.
exec_always sh -c 'pidof -q autotiling-rs || exec autotiling-rs'
exec_always sh -c 'pidof -q swaync || exec swaync'

# polkit agent: prefer PATH (Gentoo ships it in /usr/bin), fall back to the
# Fedora location (/usr/libexec) so the same config works on both targets.
exec_always sh -c 'pidof -q lxqt-policykit-agent || exec "$(command -v lxqt-policykit-agent || echo /usr/libexec/lxqt-policykit-agent)"'

# wob volume OSD: ensure the FIFO exists, then feed it into a single wob.
exec_always sh -c 'pidof -q wob || { test -e "$SWAYSOCK.wob" || mkfifo "$SWAYSOCK.wob"; exec tail -f "$SWAYSOCK.wob" | wob; }'
