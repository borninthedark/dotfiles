<?xml version="1.0"?>
<fontconfig>
  <!--
    Lock the fallback chain for Maple Mono NF.

    Fontconfig's default rules (60-latin, 65-nonlatin, etc.) append
    sans-serif fallbacks including Noto Sans Arabic (line-height 30 px
    at 14 px) to every font. Pango uses the tallest metrics from the
    entire chain, nearly doubling bar/panel height.

    assign_replace prevents later rules from appending to the list.
  -->
  <match target="pattern">
    <test qual="any" name="family" compare="eq">
      <string>Maple Mono NF</string>
    </test>
    <edit name="family" mode="assign_replace" binding="same">
      <string>Maple Mono NF</string>
      <string>Noto Sans Mono</string>
      <string>Symbols Nerd Font</string>
      <string>Symbols Nerd Font Mono</string>
    </edit>
  </match>
</fontconfig>
