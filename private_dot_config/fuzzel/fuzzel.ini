# Fuzzel configuration based on GTK dark theme
# Save to: ~/.config/fuzzel/fuzzel.ini

[main]
font=Maple Mono NF:size=14
dpi-aware=yes
prompt="❯ "
# icon-theme=Papirus-Dark
icons-enabled = no
layer=overlay
width=50
horizontal-pad=20
vertical-pad=10
inner-pad=10

[colors]
# Background (theme_bg_color, slightly translucent)
background=171a1fe6

# Text color (theme_text_color)
text=e0e0e0ff

# Match highlight (accent on unselected rows)
match=9bbfbfff

# Selection background (critical red, matches the power menu)
selection=b72f1dff

# Selection text (light, legible on red)
selection-text=e0e0e0ff

# Selection match highlight (accent teal, contrasts on the red bar)
selection-match=9bbfbfff

# Border color (borders)
border=9bbfbfff

[border]
width=1
radius=5

[dmenu]
exit-immediately-if-empty=yes
