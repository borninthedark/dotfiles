# Pin the onboard Realtek ALC623 (alsa_card.pci-0000_08_00.6) to analog stereo.
#
# Why: the board reports a blank PCI subsystem ID (ALC623 fixup for SSID
# 103c:0000), so the kernel applies no board-specific HDA fixup and jack-presence
# detection reads every analog output port as "not available". WirePlumber then
# auto-selects the "off" profile and falls back to a Dummy/auto_null sink — which
# waybar's pulseaudio module shows as "Dummy Output".
#
# Forcing the profile here keeps a real analog sink regardless of jack sense, and
# is declarative/idempotent rather than relying on the per-user runtime state in
# ~/.local/state/wireplumber/default-profile. Port (rear Line Out vs front
# Headphones) is still chosen at runtime and persisted in .../default-routes.
monitor.alsa.rules = [
  {
    matches = [
      {
        device.name = "alsa_card.pci-0000_08_00.6"
      }
    ]
    actions = {
      update-props = {
        device.profile = "output:analog-stereo"
        api.acp.auto-profile = false
      }
    }
  }
]
